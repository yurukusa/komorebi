<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こもれび — 日替わりの絵と言葉</title>
<meta name="description" content="疲れた日に、ふと開く場所。日替わりの絵と言葉。好きな言葉を集めて、自分だけの言葉を書いて、みんなで共有する。">
<meta property="og:title" content="こもれび">
<meta property="og:description" content="疲れた日に、ふと開く場所。日替わりの絵と言葉。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/komorebi/">
<meta property="og:image" content="https://yurukusa.github.io/komorebi/images/sunset-hills.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="こもれび">
<meta name="twitter:description" content="疲れた日に、ふと開く場所。">
<meta name="twitter:image" content="https://yurukusa.github.io/komorebi/images/sunset-hills.jpg">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif;
  background: #f8f6f3;
  color: #4a4a4a;
}

/* 全画面ヒーロー */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.hero {
  background: url('images/sunset-hills.jpg') center/cover no-repeat;
}
.hero canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  mix-blend-mode: screen;
  opacity: 0.4;
}
.hero-content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
  max-width: 520px;
  opacity: 0;
  animation: fadeUp 3s 0.5s ease forwards;
}
.hero-words {
  font-size: 1.3rem;
  line-height: 2.2;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 8px rgba(0,0,0,0.3);
}
.hero-words p { margin-bottom: 0.6em; }
.hero-date {
  margin-top: 2rem;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.5);
}
.scroll-hint {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 0.75rem;
  animation: pulse 3s ease infinite;
  z-index: 1;
}

/* 下のカード群 */
.cards {
  max-width: 600px;
  margin: 0 auto;
  padding: 4rem 1.5rem;
}
.card {
  text-align: center;
  padding: 3rem 1.5rem;
  margin-bottom: 1rem;
  border-radius: 16px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 1s ease, transform 1s ease, box-shadow 0.5s ease;
  cursor: default;
}
.card.visible {
  opacity: 1;
  transform: translateY(0);
}
.card.touched {
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
}
.card.longpress {
  box-shadow: 0 0 60px rgba(255, 220, 180, 0.5), inset 0 0 40px rgba(255, 255, 255, 0.1);
  transform: translateY(-2px) scale(1.01);
  transition: box-shadow 1.5s ease, transform 0.5s ease;
}
.card canvas {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 10px;
  margin-bottom: 1.5rem;
}
.card-words {
  font-size: 1.05rem;
  line-height: 2;
  letter-spacing: 0.08em;
  color: #5a5a5a;
}
.card-words p { margin-bottom: 0.5em; }

/* ハートボタン */
.heart-btn {
  margin-top: 1rem;
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.3s, transform 0.3s;
}
.heart-btn:hover { opacity: 0.6; }
.heart-btn.liked { opacity: 1; transform: scale(1.2); }

/* コレクションバー */
.collection-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  text-align: center;
  padding: 0.6rem;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  font-size: 0.85rem;
  color: #888;
  transform: translateY(-100%);
  transition: transform 0.5s ease;
  cursor: pointer;
}
.collection-bar.show { transform: translateY(0); }
.collection-count { color: #e07070; font-weight: bold; }
.streak-badge {
  display: inline-block;
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  background: rgba(255, 180, 100, 0.15);
  border-radius: 1rem;
  color: #c08040;
  margin-left: 0.5rem;
}

/* コレクションページ */
.collection-page {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 20;
  background: rgba(250,248,245,0.97);
  backdrop-filter: blur(12px);
  overflow-y: auto;
  padding: 3rem 1.5rem;
}
.collection-page.open { display: block; }
.collection-page h2 {
  text-align: center;
  font-size: 1.1rem;
  color: #888;
  margin-bottom: 2rem;
  font-weight: normal;
}
.collection-item {
  text-align: center;
  padding: 2rem 0;
  border-bottom: 1px solid #f0ece8;
  font-size: 1.05rem;
  line-height: 2;
  color: #5a5a5a;
}
.collection-item p { margin-bottom: 0.4em; }
.collection-close {
  position: fixed;
  top: 1rem;
  right: 1.5rem;
  z-index: 21;
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: #aaa;
}
.collection-msg {
  text-align: center;
  color: #ccc;
  font-size: 0.95rem;
  margin-top: 3rem;
}

/* 音ボタン */
.sound-btn {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 10;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(8px);
  cursor: pointer;
  font-size: 1.2rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}
.sound-btn:hover { transform: scale(1.1); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.6; }
}
</style>
</head>
<body>

<div class="hero">
  <canvas id="heroCanvas"></canvas>
  <div class="hero-content">
    <div class="hero-words" id="heroWords"></div>
    <div class="hero-date" id="heroDate"></div>
  </div>
  <div class="scroll-hint">↓ もっと読む</div>
</div>

<div class="collection-bar" id="collectionBar">
  あなたが集めた言葉: <span class="collection-count" id="collectionCount">0</span><span class="streak-badge" id="streakBadge" style="display:none"></span>
  <span id="collectionPraise" style="display:block;font-size:0.7rem;opacity:0;transition:opacity 1s ease;margin-top:0.2rem;color:rgba(255,255,255,0.6)"></span>
</div>

<div class="cards" id="cards"></div>

<div class="collection-page" id="collectionPage">
  <button class="collection-close" id="collectionClose">×</button>
  <h2>あなたが集めた言葉</h2>
  <div id="collectionList"></div>
</div>

<button class="sound-btn" id="writeBtn" style="bottom:4.5rem;right:1.5rem;" title="自分の言葉を書く" onclick="openWrite()">✏️</button>
<button class="sound-btn" id="shareBtn" style="bottom:7.5rem;right:1.5rem;" title="この言葉をシェア" onclick="shareOnTwitter()">𝕏</button>

<div id="writeModal" style="display:none;position:fixed;inset:0;z-index:30;background:rgba(250,248,245,0.97);backdrop-filter:blur(12px);padding:3rem 1.5rem;overflow-y:auto;">
  <button onclick="closeWrite()" style="position:fixed;top:1rem;right:1.5rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#aaa;">×</button>
  <div style="max-width:480px;margin:0 auto;text-align:center;">
    <h2 style="font-size:1.1rem;color:#888;font-weight:normal;margin-bottom:1rem;">今日の小さな幸せ</h2>
    <p style="font-size:0.85rem;color:#bbb;margin-bottom:2rem;">なんでもいい。思いついたことを書いてみて。</p>
    <textarea id="writeArea" placeholder="帰り道、いい匂いがした。" style="width:100%;height:120px;border:1px solid #e0dcd8;border-radius:12px;padding:1rem;font-family:inherit;font-size:1rem;line-height:1.8;resize:none;background:#fff;color:#4a4a4a;"></textarea>
    <button onclick="saveMyWords()" style="margin-top:1rem;padding:0.7rem 2rem;border:none;border-radius:8px;background:#e0dcd8;color:#5a5a5a;font-family:inherit;font-size:0.95rem;cursor:pointer;">残しておく</button>
    <div id="myWordsList" style="margin-top:2rem;text-align:center;"></div>
    <div style="margin-top:3rem;border-top:1px solid #e8e4e0;padding-top:2rem;">
      <h3 style="font-size:0.9rem;color:#aaa;font-weight:normal;margin-bottom:1rem;">みんなが書いた言葉</h3>
      <div id="sharedWordsList" style="text-align:center;"></div>
    </div>
  </div>
</div>

<a href="sounds.html" style="position:fixed;bottom:1.5rem;left:1.5rem;z-index:10;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 12px rgba(0,0,0,0.1);text-decoration:none;" title="環境音ミキサー">🎧</a>
<button class="sound-btn" id="soundBtn" title="環境音">🔇</button>

<script>
const entries = [
  { words: "帰り道、猫がいた。\nそれだけで今日は勝ち。", palette: ['#1a1a2e','#16213e','#0f3460','#e94560','#f5c469','#fceabb'], sky: true },
  { words: "布団に入った瞬間の\nあの「はぁー」って声。\nあれが一番正直な自分だと思う。", palette: ['#2d3436','#636e72','#b2bec3','#dfe6e9','#a8d8ea','#f8f9fa'], sky: false },
  { words: "今日も関係なく\n空は暮れていく。\nなんだか、それが少し安心する。", palette: ['#2c3e50','#2e4057','#048a81','#54c6eb','#8ee3ef','#f7f7f7'], sky: true },
  { words: "コンビニのおにぎり、うまい。\nそれでいい。", palette: ['#0d1b2a','#1b263b','#415a77','#778da9','#e0e1dd','#c9ada7'], sky: false },
  { words: "誰にも言わなかったけど、\n今日ちょっとがんばった。\n自分だけ知ってる。", palette: ['#355070','#6d597a','#b56576','#e56b6f','#eaac8b','#f8edeb'], sky: false },
  { words: "風が吹いた。\nそれだけのことが、妙にうれしい日もある。", palette: ['#606c38','#283618','#fefae0','#dda15e','#bc6c25','#8fbc8f'], sky: false },
  { words: "夜が静かなのは、\n世界が明日のために\nいま息をしてるからだと思う。", palette: ['#03045e','#023e8a','#0077b6','#0096c7','#48cae4','#caf0f8'], sky: true },
  { words: "雨の音。\nなにもしなくていい理由を\n空がくれた。", palette: ['#434343','#5a5a5a','#7c8594','#a0b0c0','#c4d4e0','#e8ecf0'], sky: false },
  { words: "電車の窓に映った自分、\n思ったより\nちゃんとした顔してた。", palette: ['#1b1b2f','#1f3044','#2a5a6a','#5ca08e','#a1d6b2','#f1f1e8'], sky: false },
  { words: "めんどくさい、が口癖の日。\nでもちゃんとご飯は食べた。\nえらい。", palette: ['#2b2d42','#3d3f5c','#8d99ae','#d4a373','#edc4b3','#fefae0'], sky: true },
  { words: "缶コーヒー、あったかい。\n手のひらから\nじんわり生きてる感じがする。", palette: ['#3d2b1f','#5c4033','#8b6f47','#c4a35a','#dbc9a0','#f5eedc'], sky: false },
  { words: "信号待ち。\n隣のおばあちゃんが\n鼻歌うたってた。\nちょっと笑った。", palette: ['#264653','#2a6f5f','#2a9d8f','#e9c46a','#f4a261','#fdf4e8'], sky: false },
  { words: "月がでかい。\nそれだけで今日はいい日だった気がする。", palette: ['#0a0a23','#141432','#1e1e50','#3a3a8c','#7070b8','#e0e0f0'], sky: true },
  { words: "お風呂のお湯に沈む瞬間。\nあ、今日おわった。って。\nそれが一番ほっとする。", palette: ['#3a3a5c','#4a5a7a','#6a8aaa','#9ab8d8','#c8daea','#eaf2f8'], sky: false },
  { words: "朝、カーテン開けたら\n知らない鳥が鳴いてた。\nなんか得した。", palette: ['#fdf6e3','#f5e6ca','#e8c170','#d4956b','#a3c4bc','#7eb8c9'], sky: true },
  { words: "傘、忘れた。\nでも走ったら走ったで\n雨ってちょっと気持ちいい。", palette: ['#4a4a5a','#5a6070','#708090','#90a0b0','#b0c4de','#d0dae8'], sky: false },
  { words: "好きな曲を\nイヤホンで聴きながら歩く。\nその間だけ\n世界が自分のもの。", palette: ['#1a1a2e','#2d2d44','#4a3f6b','#7b6fa0','#b8a9c9','#e8e0f0'], sky: false },
  { words: "冷蔵庫にプリンがある。\n昨日の自分、ナイス。", palette: ['#fef9ef','#fceabb','#f8d49a','#e8b87a','#c8a070','#a08060'], sky: false },
  { words: "星がきれいな夜は\n悩みごとがちょっとバカバカしくなる。\nスケールが違いすぎて。", palette: ['#050520','#0a0a40','#151560','#3030a0','#6060d0','#c0c0f0'], sky: true },
  { words: "なんにもしなかった日。\nでも息はしてた。\nそれでいいんじゃないの。", palette: ['#e8e4e0','#d0ccc8','#b8b4b0','#a09c98','#888480','#f0ece8'], sky: false },
  { words: "スーパーの惣菜コーナーで\nめちゃくちゃ悩む。\nこの真剣さ、仕事でも出せたらな。", palette: ['#f5f0e0','#e8d8b0','#d4c090','#c0a870','#a89060','#f8f4ec'], sky: false },
  { words: "古い友達からLINE来た。\n「元気？」だけ。\nそれだけで元気になるのズルい。", palette: ['#2a4a3a','#3a6a50','#5a9a70','#80c090','#a8d8b0','#e0f0e4'], sky: false },
  { words: "洗濯物がよく乾いた。\nたったそれだけのことが\nめちゃくちゃ気持ちいい。", palette: ['#e0f0ff','#c0e0f8','#80c0e8','#40a0d8','#2080b8','#f0f8ff'], sky: true },
  { words: "寝る前に「明日何食べよう」って考える。\nこれ、地味に幸せなんだと思う。", palette: ['#1a1a30','#2a2a48','#3a3a60','#5a5a88','#8888b0','#c0c0d8'], sky: false },
  { words: "子どもが転んで泣いて\n3秒で笑ってた。\nあの切り替え見習いたい。", palette: ['#fff8e7','#ffe8b0','#ffd080','#ffb860','#ff9840','#fff4e0'], sky: false },
  { words: "散歩してたら\n知らない花が咲いてた。\n名前は知らないけど\nきれいだった。", palette: ['#2a402a','#3a5a38','#5a8a50','#80b868','#a8d890','#e0f0d8'], sky: false },
  { words: "帰り道のコンビニで\n新作スイーツ発見した。\n今週がんばった自分への\nごほうびってことにする。", palette: ['#1a2a4a','#2a4a6a','#4a7a9a','#7aaaca','#aadaea','#e0f0f8'], sky: true },
  { words: "自販機のボタン押す瞬間、\nちょっとだけワクワクする。\nたかが缶ジュースなのに。", palette: ['#4a3040','#6a4858','#9a7080','#c898a8','#e0c0c8','#f8e8ec'], sky: false },
  { words: "駅のホームで\nみんな同じ方向を見てる。\nなんかちょっと仲間っぽい。", palette: ['#303040','#484858','#686878','#909098','#b8b8c0','#e0e0e4'], sky: false },
  { words: "日曜の朝。\n目覚ましが鳴らないって\nこんなにうれしいのか。", palette: ['#fdf8f0','#f8e8d0','#f0d8b0','#e0c898','#d0b880','#faf4ec'], sky: true },
  { words: "焼きたてのパンの匂い。\n理由もなく\nいい日になりそうな気がする。", palette: ['#f5e6d0','#e8d0a8','#d8b880','#c8a060','#a88848','#faf0e0'], sky: false },
  { words: "靴ひもがほどけた。\n結び直すために、\nちょっとだけ立ち止まれた。", palette: ['#4a4a3a','#6a6a50','#8a8a68','#aaa880','#c8c8a0','#e8e8d8'], sky: false },
  { words: "夜中にトイレ行って戻ったら\n布団があったかかった。\nあー、自分ここにいたんだな、って。", palette: ['#1a1a28','#2a2a40','#3a3a58','#5a5a78','#8a8aa0','#c0c0d0'], sky: false },
  { words: "昼休み、ベンチでぼーっとした。\n何も考えてなかった。\nたぶん今月で一番いい時間。", palette: ['#4a6a4a','#5a8a58','#70a868','#90c880','#b0e0a0','#e0f0d8'], sky: true },
  { words: "スマホの充電が100%になってた。\nなぜかうれしい。\n自分も満タンになりたい。", palette: ['#2a3a4a','#3a5060','#4a6878','#6a90a0','#90b8c8','#c0e0e8'], sky: false },
  { words: "知らないおじさんが\nドア押さえててくれた。\nありがとう、って言ったら\nちょっと照れてた。", palette: ['#5a4a3a','#7a6a50','#9a8a68','#b8a880','#d0c8a0','#e8e0d0'], sky: false },
  { words: "夕焼けがきれいで\n写真撮ろうとしたけど、\nうまく撮れなかった。\nでも見たのは本物だから。", palette: ['#2a1a3a','#4a3060','#7a4880','#b068a0','#d890c0','#f0c8e0'], sky: true },
  { words: "自販機の「あたたかい」の文字。\n冬はこの3文字に\n何度救われたか。", palette: ['#3a2a1a','#5a4030','#7a5848','#a07060','#c89880','#e8c8b0'], sky: false },
  { words: "エスカレーターの手すりに\n手を乗せた瞬間、\nちょっとだけ\n誰かに支えられてる感じがした。", palette: ['#2a2a3a','#404058','#585878','#7878a0','#a0a0c0','#d0d0e0'], sky: false },
  { words: "アイスの当たり棒。\n誰にも言わず\nひとりでガッツポーズした。", palette: ['#f0e8d8','#e0d0b0','#c8b890','#b0a070','#988858','#f8f4ec'], sky: false },
  { words: "バスの窓から見た夕日。\n降りるの忘れそうになった。\nまあ、一駅ぐらいいいか。", palette: ['#2a1a1a','#4a2a28','#804040','#c06858','#e8a088','#fce0d0'], sky: true },
  { words: "レシートの裏に\n小さいメモが残ってた。\n「牛乳」って。\nなんか笑った。", palette: ['#f8f0e8','#e8e0d0','#d0c8b8','#b8b0a0','#a09888','#f0ece4'], sky: false },
  { words: "かき氷のシロップ、\n全部同じ味って知ってるのに\n毎回悩む。\nそういう無駄が好き。", palette: ['#e0f8ff','#a0e0f0','#60c0e0','#30a0d0','#1080b0','#f0fcff'], sky: true },
  { words: "推しの新曲が出た。\nイントロ3秒で泣いた。\nなんだこの涙腺。", palette: ['#1a0a2a','#2a1a4a','#4a3070','#7050a0','#a080d0','#d8c8f0'], sky: false },
  { words: "コインランドリーの\n乾燥機がグルグル回ってる。\nなんかずっと見てられる。", palette: ['#f0f0e8','#d8d8d0','#c0c0b8','#a8a8a0','#909088','#f4f4f0'], sky: false },
  { words: "夏の夜、窓あけたら\nどこかで花火の音がした。\n見えなかったけど、\nそれでよかった。", palette: ['#0a0a20','#1a1a40','#2a2a60','#4a4a88','#7070b0','#b0b0d8'], sky: true },
  { words: "マスクの下で\nこっそり笑ってる。\n誰にもバレてない。\nたぶん。", palette: ['#e8e8e8','#d0d0d0','#b0b0b0','#909090','#787878','#f0f0f0'], sky: false },

  { words: "夕焼けに染まった雲を見て、\n「きれい」と思えた。\nそれだけで\n今日は十分だった気がする。", palette: ['#2a0a10','#5a2020','#a04040','#d07050','#e8a080','#fce0d0'], sky: true, time: 'evening', rarity: '🌇' },
  { words: "昼下がり。\nあくびが出た。\n平和な証拠。", palette: ['#e0e8f0','#d0d8e8','#c0c8d8','#a8b8c8','#90a0b8','#f0f4f8'], sky: true, time: 'day', rarity: '☀️' },

// ヒーロー絵（アニメーション付き）
const hc = document.getElementById('heroCanvas');
const hctx = hc.getContext('2d');
function resizeHero() { hc.width = window.innerWidth; hc.height = window.innerHeight; }
resizeHero();
window.addEventListener('resize', resizeHero);

let frame = 0;
function drawHero() {
  const w = hc.width, h = hc.height, p = hero.palette;
  const grad = hctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, p[0]); grad.addColorStop(0.3, p[1]); grad.addColorStop(0.5, p[2]);
  grad.addColorStop(0.7, p[3]); grad.addColorStop(0.85, p[4]); grad.addColorStop(1, p[5]);
  hctx.fillStyle = grad;
  hctx.fillRect(0, 0, w, h);

  // 時刻によるティント
  hctx.fillStyle = timeTint;
  hctx.fillRect(0, 0, w, h);

  const t = frame * 0.005;

  // 光の粒がゆっくり漂う（時刻で色が変わる）
  const particleCount = timeOfDay === 'night' ? 30 : 50;
  for (let i = 0; i < particleCount; i++) {
    const seed = i * 137.5 + dayOfYear;
    const x = (Math.sin(seed + t * (0.3 + i * 0.01)) * 0.5 + 0.5) * w;
    const y = (Math.cos(seed * 0.7 + t * (0.2 + i * 0.008)) * 0.5 + 0.5) * h;
    const r = 1.5 + Math.sin(seed) * 2;
    const alpha = 0.03 + Math.sin(t + seed) * 0.02;
    hctx.beginPath();
    hctx.arc(x, y, r, 0, Math.PI * 2);
    hctx.fillStyle = `rgba(${particleColor[0]},${particleColor[1]},${particleColor[2]},${Math.max(0, alpha)})`;
    hctx.fill();
  }

  // 稜線
  hctx.beginPath();
  hctx.moveTo(0, h * 0.78);
  for (let x = 0; x <= w; x += 3) {
    const y = h * 0.78 + Math.sin(x * 0.005 + t * 0.3) * 20 + Math.sin(x * 0.015 + t * 0.1) * 8;
    hctx.lineTo(x, y);
  }
  hctx.lineTo(w, h); hctx.lineTo(0, h); hctx.closePath();
  hctx.fillStyle = p[0] + '90';
  hctx.fill();

  frame++;
  requestAnimationFrame(drawHero);
}
drawHero();

// --- カード群 ---
const cardsEl = document.getElementById('cards');
// 今日以外をシャッフルして表示
const otherIdxs = [];

// シャッフル（日付ベースで安定）
for (let i = otherIdxs.length - 1; i > 0; i--) {
  const j = Math.abs(Math.sin(dayOfYear * 31 + i * 17)) * (i + 1) | 0;
  [otherIdxs[i], otherIdxs[j]] = [otherIdxs[j], otherIdxs[i]];
}

otherIdxs.forEach((idx, i) => {
  const e = entries[idx];
  const card = document.createElement('div');
  card.className = 'card';
  card.style.background = `linear-gradient(135deg, ${e.palette[4]}20, ${e.palette[5]}30)`;

  const cvs = document.createElement('canvas');
  cvs.width = 640; cvs.height = 360;
  card.appendChild(cvs);

  const wordsDiv = document.createElement('div');
  wordsDiv.className = 'card-words';
  e.words.split('\n').forEach(line => {
    const p = document.createElement('p');
    p.textContent = line;
    wordsDiv.appendChild(p);
  });
  if (e.isRare) {
    const rareTag = document.createElement('span');
    rareTag.textContent = e.rarity + ' いまだけ';
    rareTag.style.cssText = 'display:inline-block;font-size:0.7rem;padding:0.2rem 0.5rem;background:rgba(255,215,0,0.15);border-radius:1rem;margin-bottom:0.3rem;color:#b8860b;';
    wordsDiv.insertBefore(rareTag, wordsDiv.firstChild);
  }
  card.appendChild(wordsDiv);
  // タッチすると一瞬光る
  card.addEventListener('click', function() {
    card.classList.add('touched');
    setTimeout(function() { card.classList.remove('touched'); }, 1500);
  });
  addHeart(card, idx);
  const shareBtn = document.createElement('button');
  shareBtn.textContent = '𝕏';
  shareBtn.style.cssText = 'background:none;border:none;font-size:1rem;cursor:pointer;opacity:0.2;margin-left:0.5rem;';
  shareBtn.title = 'シェア';
  shareBtn.addEventListener('click', () => shareCardOnTwitter(e.words.replace(/\\n/g, '\n')));
  shareBtn.addEventListener('mouseenter', () => shareBtn.style.opacity = '0.5');
  shareBtn.addEventListener('mouseleave', () => shareBtn.style.opacity = '0.2');
  card.appendChild(shareBtn);
  cardsEl.appendChild(card);

  // カードの絵を描く
  const ctx = cvs.getContext('2d');
  const cw = cvs.width, ch = cvs.height, p = e.palette;
  const g = ctx.createLinearGradient(0, 0, 0, ch);
  g.addColorStop(0, p[0]); g.addColorStop(0.4, p[2]); g.addColorStop(0.7, p[3]); g.addColorStop(1, p[5]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cw, ch);
  const seed = idx * 137.5;
  for (let j = 0; j < 20; j++) {
    const x = (Math.sin(seed + j * 97) * 0.5 + 0.5) * cw;
    const y = (Math.cos(seed + j * 61) * 0.5 + 0.5) * ch;
    ctx.beginPath();
    ctx.arc(x, y, 1.5 + Math.sin(seed + j) * 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.04 + Math.sin(seed + j * 13) * 0.02})`;
    ctx.fill();
  }
  ctx.beginPath();
  ctx.moveTo(0, ch * 0.75);
  for (let x = 0; x <= cw; x += 3) {
    ctx.lineTo(x, ch * 0.75 + Math.sin(x * 0.01 + seed * 0.1) * 12);
  }
  ctx.lineTo(cw, ch); ctx.lineTo(0, ch); ctx.closePath();
  ctx.fillStyle = p[0] + '70';
  ctx.fill();
});

  if (count === 0) {

  } else {
    liked.forEach(idx => {
      const e = entries[idx];

      e.words.split('\n').forEach(line => {
        const p = document.createElement('p');

        item.appendChild(p);
      });

  // コレクション数で背景が少し変わる（さりげなく）
  if (count >= 10) document.body.style.background = '#f5f3f0';

  // コレクション数に応じたさりげない褒め
  const praises = [
    [3, 'いいセンスしてる'],
    [7, 'もう7つも。素敵なコレクション'],
    [12, 'あなたが選んだ言葉、全部いい'],
    [20, '20個。この感性、大事にして'],
    [30, '言葉のソムリエだね']
  ];
  const praiseEl = document.getElementById('collectionPraise');
  if (praiseEl) {
    let msg = '';
    for (let i = praises.length - 1; i >= 0; i--) {
      if (count >= praises[i][0]) { msg = praises[i][1]; break; }
    }
    praiseEl.textContent = msg;
    praiseEl.style.opacity = msg ? '1' : '0';
  }
}

function addHeart(container, idx) {
  const btn = document.createElement('button');
  btn.className = 'heart-btn' + (liked.includes(idx) ? ' liked' : '');
  btn.textContent = liked.includes(idx) ? '♥' : '♡';
  btn.addEventListener('click', () => {
    if (liked.includes(idx)) {
      liked = liked.filter(i => i !== idx);
      btn.classList.remove('liked');
      btn.textContent = '♡';
    } else {
      liked.push(idx);
      btn.classList.add('liked');
      btn.textContent = '♥';
    }
    updateCollection();
  });
  container.appendChild(btn);
}

// --- 環境音（ホワイトノイズ→ローパスで風/雨音風） ---
let audioCtx, noiseNode, gainNode, playing = false;
document.getElementById('soundBtn').addEventListener('click', () => {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    const bufSize = audioCtx.sampleRate * 4;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = buf;
    noiseNode.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    filter.Q.value = 0.7;
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0;
    noiseNode.connect(filter).connect(gainNode).connect(audioCtx.destination);
    noiseNode.start();
  }
  playing = !playing;
  gainNode.gain.linearRampToValueAtTime(playing ? 0.15 : 0, audioCtx.currentTime + 1);
  document.getElementById('soundBtn').textContent = playing ? '🔊' : '🔇';
});

// --- 訪問ストリーク ---
(function() {
  const todayStr = new Date().toISOString().slice(0, 10);
  const data = JSON.parse(localStorage.getItem('komorebi-streak') || '{}');
  let streak = 1;

  if (data.lastVisit) {
    const last = new Date(data.lastVisit);
    const diff = Math.floor((new Date(todayStr) - last) / 86400000);
    if (diff === 0) {
      streak = data.streak || 1;
    } else if (diff === 1) {
      streak = (data.streak || 0) + 1;
    }
    // diff > 1 ならリセット（streak = 1）
  }

  localStorage.setItem('komorebi-streak', JSON.stringify({ lastVisit: todayStr, streak }));

  if (streak >= 2) {
    const badge = document.getElementById('streakBadge');
    badge.style.display = 'inline-block';
    const milestones = { 30: '🌳 ', 14: '🌿 ', 7: '🍀 ', 3: '🌱 ', 2: '' };
    let icon = '';
    for (const [days, emoji] of Object.entries(milestones).sort((a,b) => b[0]-a[0])) {
      if (streak >= Number(days)) { icon = emoji; break; }
    }
    badge.textContent = icon + streak + '日連続';
    document.getElementById('collectionBar').classList.add('show');
  }
})();
