<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おと — 環境音で、すこし静かになる</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  background: #1a1a2e;
  color: rgba(255,255,255,0.7);
}
h1 {
  font-size: 1.2rem;
  font-weight: normal;
  margin-bottom: 0.5rem;
  color: rgba(255,255,255,0.4);
}
.subtitle {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.25);
  margin-bottom: 3rem;
}
.sounds {
  display: flex;
  flex-wrap: wrap;
  gap: 1.5rem;
  justify-content: center;
  max-width: 400px;
}
.sound-card {
  width: 100px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.3s;
}
.sound-card:hover { transform: scale(1.05); }
.sound-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin: 0 auto 0.5rem;
  transition: box-shadow 0.5s, background 0.5s;
  background: rgba(255,255,255,0.05);
}
.sound-card.active .sound-icon {
  box-shadow: 0 0 20px rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.1);
}
.sound-label {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.4);
}
.sound-card.active .sound-label {
  color: rgba(255,255,255,0.7);
}
.volume-row {
  margin-top: 3rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.volume-row input[type=range] {
  width: 180px;
  accent-color: rgba(255,255,255,0.3);
}
.volume-label {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.3);
}
.back-link {
  position: fixed;
  top: 1rem;
  left: 1.5rem;
  color: rgba(255,255,255,0.2);
  text-decoration: none;
  font-size: 0.8rem;
}
.back-link:hover { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<a href="index.html" class="back-link">← こもれび</a>
<h1>おと</h1>
<p class="subtitle">好きな音を、好きなだけ</p>

<div class="sounds">
  <div class="sound-card" data-sound="rain" onclick="toggle(this)">
    <div class="sound-icon">🌧</div>
    <div class="sound-label">雨</div>
  </div>
  <div class="sound-card" data-sound="fire" onclick="toggle(this)">
    <div class="sound-icon">🔥</div>
    <div class="sound-label">焚き火</div>
  </div>
  <div class="sound-card" data-sound="wave" onclick="toggle(this)">
    <div class="sound-icon">🌊</div>
    <div class="sound-label">波</div>
  </div>
  <div class="sound-card" data-sound="wind" onclick="toggle(this)">
    <div class="sound-icon">🍃</div>
    <div class="sound-label">風</div>
  </div>
  <div class="sound-card" data-sound="bird" onclick="toggle(this)">
    <div class="sound-icon">🐦</div>
    <div class="sound-label">鳥</div>
  </div>
  <div class="sound-card" data-sound="night" onclick="toggle(this)">
    <div class="sound-icon">🦗</div>
    <div class="sound-label">夜の虫</div>
  </div>
</div>

<div class="volume-row">
  <span class="volume-label">🔈</span>
  <input type="range" id="masterVol" min="0" max="100" value="50">
  <span class="volume-label">🔊</span>
</div>

<script>
let ctx;
const sources = {};

function getCtx() {
  if (!ctx) ctx = new AudioContext();
  return ctx;
}

function createNoise(duration) {
  const ac = getCtx();
  const sr = ac.sampleRate;
  const len = sr * duration;
  const buf = ac.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  }
  return buf;
}

function makeRain() {
  const ac = getCtx();
  const src = ac.createBufferSource();
  src.buffer = createNoise(4);
  src.loop = true;
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 800; lp.Q.value = 0.5;
  const hp = ac.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 200;
  const gain = ac.createGain();
  gain.gain.value = 0;
  src.connect(lp).connect(hp).connect(gain).connect(ac.destination);
  src.start();
  return { gain, src };
}

function makeFire() {
  const ac = getCtx();
  const src = ac.createBufferSource();
  src.buffer = createNoise(4);
  src.loop = true;
  const bp = ac.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 0.3;
  const gain = ac.createGain();
  gain.gain.value = 0;
  src.connect(bp).connect(gain).connect(ac.destination);
  src.start();
  return { gain, src };
}

function makeWave() {
  const ac = getCtx();
  const src = ac.createBufferSource();
  src.buffer = createNoise(8);
  src.loop = true;
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 500;
  const gain = ac.createGain();
  gain.gain.value = 0;
  // LFOで波の揺れ
  const lfo = ac.createOscillator();
  lfo.frequency.value = 0.08;
  const lfoGain = ac.createGain();
  lfoGain.gain.value = 0.3;
  lfo.connect(lfoGain).connect(gain.gain);
  lfo.start();
  src.connect(lp).connect(gain).connect(ac.destination);
  src.start();
  return { gain, src, lfo };
}

function makeWind() {
  const ac = getCtx();
  const src = ac.createBufferSource();
  src.buffer = createNoise(4);
  src.loop = true;
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 300; lp.Q.value = 0.7;
  const gain = ac.createGain();
  gain.gain.value = 0;
  src.connect(lp).connect(gain).connect(ac.destination);
  src.start();
  return { gain, src };
}

function makeBird() {
  const ac = getCtx();
  const osc = ac.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 2000;
  const vibrato = ac.createOscillator();
  vibrato.frequency.value = 5;
  const vibGain = ac.createGain();
  vibGain.gain.value = 200;
  vibrato.connect(vibGain).connect(osc.frequency);
  const gain = ac.createGain();
  gain.gain.value = 0;
  // 断続的に鳴るLFO
  const gate = ac.createOscillator();
  gate.frequency.value = 0.3;
  const gateGain = ac.createGain();
  gateGain.gain.value = 0.5;
  gate.connect(gateGain).connect(gain.gain);
  osc.connect(gain).connect(ac.destination);
  osc.start(); vibrato.start(); gate.start();
  return { gain, src: osc, extras: [vibrato, gate] };
}

function makeNight() {
  const ac = getCtx();
  const osc = ac.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 4200;
  const trem = ac.createOscillator();
  trem.frequency.value = 8;
  const tremGain = ac.createGain();
  tremGain.gain.value = 0.5;
  trem.connect(tremGain).connect(osc.frequency);
  const gain = ac.createGain();
  gain.gain.value = 0;
  const gate = ac.createOscillator();
  gate.frequency.value = 0.5;
  const gateGain = ac.createGain();
  gateGain.gain.value = 0.4;
  gate.connect(gateGain).connect(gain.gain);
  osc.connect(gain).connect(ac.destination);
  osc.start(); trem.start(); gate.start();
  return { gain, src: osc, extras: [trem, gate] };
}

const makers = { rain: makeRain, fire: makeFire, wave: makeWave, wind: makeWind, bird: makeBird, night: makeNight };
const masterVol = document.getElementById('masterVol');

function toggle(card) {
  const sound = card.dataset.sound;
  if (sources[sound]) {
    // fade out
    const s = sources[sound];
    s.gain.gain.linearRampToValueAtTime(0, getCtx().currentTime + 1);
    setTimeout(() => {
      s.src.stop();
      if (s.extras) s.extras.forEach(e => e.stop());
      if (s.lfo) s.lfo.stop();
    }, 1200);
    delete sources[sound];
    card.classList.remove('active');
  } else {
    const s = makers[sound]();
    const vol = masterVol.value / 100 * 0.2;
    s.gain.gain.linearRampToValueAtTime(vol, getCtx().currentTime + 1);
    sources[sound] = s;
    card.classList.add('active');
  }
}

masterVol.addEventListener('input', () => {
  const vol = masterVol.value / 100 * 0.2;
  Object.values(sources).forEach(s => {
    s.gain.gain.linearRampToValueAtTime(vol, getCtx().currentTime + 0.3);
  });
});
</script>
</body>
</html>
